name: Publicar etiquetas

on:
  push:
    paths:
      - data/labels.csv
      - data/labels.csv.b64
      - scripts/gerar_etiquetas_publicas.cjs
      - scripts/gerar_etiquetas_publicas_b64.cjs
      - .github/workflows/publicar-etiquetas.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/gerar_etiquetas_publicas_b64.cjs
      - name: Commit etiquetas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etiquetas_correios
          if git diff --cached --quiet; then
            echo "Sem alteracoes para publicar."
          else
            git commit -m "Publica etiquetas geradas [skip ci]"
            git push
          fi
